name: cjm-sys-mon-nvidia
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - pip:
    - nvitop
    # Stage 8 (Option C): the substrate is AUTO-INJECTED by install-all (schema
    # v2), so cjm-plugin-system is no longer listed here. The monitor depends
    # only on the telemetry data nouns (cjm-capability-primitives), not the
    # dissolved cjm-infra-plugin-system domain interface lib.
    - cjm-capability-primitives
    # Worker dependencies
    - fastapi
    - uvicorn
    - psutil
    - httpx
